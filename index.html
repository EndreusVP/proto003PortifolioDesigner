
<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Martins Editor | Portfolio HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Permanent+Marker&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <style>
      :root {
        --cp-gold: rgb(234, 186, 94);
        --cp-red: #b31d1d;
      }
      body {
        margin: 0;
        padding: 0;
        background-color: #050505;
        color: white;
        overflow-x: hidden;
      }
      .font-comic { font-family: 'Bangers', cursive; }
      .font-marker { font-family: 'Permanent Marker', cursive; }
      .font-action { font-family: 'Roboto Condensed', sans-serif; }

      .halftone-bg {
        background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 10px 10px;
      }

      /* Animação de Papel Rasgado Multicamadas */
      @keyframes ripFast {
        0% { transform: translateX(-110%) skewX(-20deg); opacity: 1; }
        50% { opacity: 1; }
        100% { transform: translateX(110%) skewX(-20deg); opacity: 0; }
      }
      
      .rip-layer {
        position: absolute;
        inset: -20%;
        z-index: 100;
        pointer-events: none;
        box-shadow: 20px 0 50px rgba(0,0,0,0.5);
      }
      
      .rip-white { background: #f0f0f0; filter: url(#paper-tear); }
      .rip-gray { background: #ccc; filter: url(#paper-tear); }
      
      .animate-rip-1 { animation: ripFast 0.5s forwards ease-in; }
      .animate-rip-2 { animation: ripFast 0.5s 0.1s forwards ease-in; }

      /* Sticker Contorno */
      .sticker-outline {
        filter: drop-shadow(4px 4px 0px white) drop-shadow(-4px -4px 0px white) drop-shadow(4px -4px 0px white) drop-shadow(-4px 4px 0px white) drop-shadow(10px 10px 0px var(--cp-gold));
      }

      /* Estilo HQ de Botão */
      .hq-hover {
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .hq-hover:hover {
        transform: scale(1.1) rotate(-2deg);
        background-color: var(--cp-gold) !important;
        color: black !important;
        box-shadow: 8px 8px 0px black;
      }

      ::-webkit-scrollbar { width: 14px; }
      ::-webkit-scrollbar-track { background: #000; }
      ::-webkit-scrollbar-thumb { background: var(--cp-gold); border: 4px solid #000; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <!-- Padrões e Filtros SVG -->
    <svg style="position: absolute; width: 0; height: 0;">
      <defs>
        <pattern id="halftonePattern" patternUnits="userSpaceOnUse" width="10" height="10">
          <circle cx="2" cy="2" r="1.5" fill="rgba(0,0,0,0.4)" />
        </pattern>
        <filter id="paper-tear">
          <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="30" />
        </filter>
      </defs>
    </svg>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
